<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 680" role="img" aria-label="Sell Your Device">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop stop-color="#f2fbff" offset="0"/>
      <stop stop-color="#ffffff" offset="0.45"/>
      <stop stop-color="#eaf6ff" offset="1"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1" y1="0" y2="1">
      <stop stop-color="#36e0ff" offset="0"/>
      <stop stop-color="#0a1768" offset="1"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="22" flood-color="#02083f" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect width="900" height="680" rx="44" fill="url(#bg)"/>
  <circle cx="740" cy="110" r="108" fill="#36e0ff" opacity="0.15"/>
  <circle cx="140" cy="575" r="150" fill="#102b86" opacity="0.08"/>
  <rect x="110" y="96" width="680" height="450" rx="34" fill="#fff" filter="url(#shadow)"/>
  <rect x="110" y="96" width="680" height="86" rx="34" fill="#02083f"/>
  <text x="156" y="151" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="800" fill="#ffffff">iTop</text>
  <text x="704" y="151" text-anchor="end" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="800" fill="#21d7ff">Buy / Sell</text>
  <text x="450" y="316" text-anchor="middle" dominant-baseline="middle" font-family="Arial, Helvetica, sans-serif" font-size="132" fill="url(#accent)">💷</text>
  <text x="450" y="445" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="48" font-weight="900" fill="#02083f">Sell Your Device</text>
  <text x="450" y="492" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="600" fill="#607087">Condition checked first</text>
</svg>